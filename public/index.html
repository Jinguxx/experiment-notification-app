<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Encourage Me Button</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <h1>Send Me a Goal Reminder</h1>
      <p>
        Press the button to anonymously send encouragement to my phone. Optionally add a short note.
      </p>

      <form id="reminder-form">
        <label for="message">Optional message</label>
        <textarea
          id="message"
          name="message"
          maxlength="200"
          rows="4"
          placeholder="You got this. Keep showing up!"
        ></textarea>

        <button id="send-btn" type="submit">Send anonymous reminder</button>
      </form>

      <p id="status" aria-live="polite"></p>
      <small>
        No login. No name. Just encouragement.
      </small>
    </main>

    <script>
      const form = document.getElementById('reminder-form');
      const sendBtn = document.getElementById('send-btn');
      const statusEl = document.getElementById('status');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const message = document.getElementById('message').value;
        sendBtn.disabled = true;
        statusEl.textContent = 'Sending...';

        try {
          const response = await fetch('/api/remind', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
          });

          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || 'Failed to send reminder.');
          }

          form.reset();
          statusEl.textContent = 'Reminder sent ✅';
        } catch (error) {
          statusEl.textContent = `Could not send: ${error.message}`;
        } finally {
          sendBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
